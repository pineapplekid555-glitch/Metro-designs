[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm --filter @workspace/discord-bot install --no-frozen-lockfile && pnpm --filter @workspace/discord-bot run build"

[deploy]
startCommand = "pnpm --filter @workspace/discord-bot run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
